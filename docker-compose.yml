services:
  chorequest_new:
    build: .
    ports:
      - "5006:8122"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - TZ=${TZ:-Asia/Ho_Chi_Minh}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////app/data/chores_os.db}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8122/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
